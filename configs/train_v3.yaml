model_name: openai/whisper-large-v3-turbo
e_pretrained_path: priors/e_pretrained_v1.pt
text_files:
  - data/train/domain_text.txt
  - data/train/prompts_std.txt
  - data/train/augmented_prompts.txt
output_dir: priors/train_run_003
max_steps: 1000
save_every: 100
log_every: 10
batch_size: 8
lr: 0.00003
warmup_steps: 50
scheduler: cosine
grad_clip: 1.0
ema_decay: 0.999
kl_weight: 0.1
bd_weight: 1.0
lexicon_path: data/lexicon/domain_terms.txt
language: ko
device: cuda
