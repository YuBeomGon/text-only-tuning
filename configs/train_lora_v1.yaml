model_name: openai/whisper-large-v3-turbo
e_pretrained_path: priors/e_pretrained_v1.pt
text_files:
  - data/train/domain_text.txt
  - data/train/prompts_std.txt
  - data/train/augmented_prompts.txt
output_dir: lora/run_001
max_steps: 4000
save_every: 200
log_every: 100
batch_size: 8
lr: 0.001
warmup_steps: 200
scheduler: cosine
grad_clip: 1.0
ema_decay: 0.99
lora_r: 8
lora_alpha: 16
lora_dropout: 0.05
target_modules:
  - q_proj
  - v_proj
language: ko
device: cuda
